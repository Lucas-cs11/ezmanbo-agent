[pytest]
# Pytest 配置文件

# 最小 Python 版本
minversion = 7.0

# 测试路径
testpaths = tests

# Python 文件模式
python_files = test_*.py

# 测试函数/类模式
python_classes = Test*
python_functions = test_*

# 标记定义
markers =
    slow: 标记为慢速测试（执行时间 > 1s）
    concurrent: 标记为并发测试
    benchmark: 标记为性能基准测试
    integration: 标记为集成测试
    smoke: 标记为冒烟测试

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（可选）
# addopts = --cov=app --cov-report=html

# 超时配置
timeout = 300
timeout_method = thread
