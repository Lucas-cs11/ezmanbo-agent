name: CI - Python 3.11

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build essentials
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade pip

      - name: Install requirements (prefer binary wheels to avoid building pydantic-core)
        run: |
          pip install --prefer-binary -r requirements.txt

      - name: Run eval runner (minimal E2E smoke)
        run: |
          python -m tests.eval_runner

      - name: Upload eval results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval_results
          path: docs/eval_results.md

